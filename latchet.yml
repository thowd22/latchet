# latchet's own self-build pipeline.
#
# `checkout` clones the repo once; build / vet / test inherit its
# workspace and run in parallel (v3 workspace inheritance). Run from
# the repo root with:
#
#   latchet                # parallel (default; uses NumCPU)
#   latchet -max-parallel 1  # sequential, live-stream output
#   latchet -dry-run         # show the plan without running
#
# The container image is fully-qualified (docker.io/library/golang:1.22.2)
# so podman hosts without unqualified-search registries pull it without
# an alias. `inherit:` must also appear in `needs:` — the dependency
# graph stays self-documenting.
name: latchet self-build
env:
  REPO: https://github.com/thowd22/latchet.git
  REF: main
jobs:
  checkout:
    container: docker.io/library/golang:1.22.2
    steps:
      - name: clone
        run: git clone --depth 1 --branch "$REF" "$REPO" .

  build:
    container: docker.io/library/golang:1.22.2
    needs: checkout
    inherit: checkout
    steps:
      - name: go build
        run: go build ./...

  vet:
    container: docker.io/library/golang:1.22.2
    needs: checkout
    inherit: checkout
    steps:
      - name: go vet
        run: go vet ./...

  test:
    container: docker.io/library/golang:1.22.2
    needs: checkout
    inherit: checkout
    steps:
      - name: go test
        run: go test ./...
