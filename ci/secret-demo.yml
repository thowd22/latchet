name: secret-demo
# Exercises secret masking: MY_SECRET is sourced from the host env, injected
# into the step (so it's present and full-length), and masked in the output.
secrets: [MY_SECRET]
jobs:
  s:
    container: alpine:3.19
    steps:
      - name: use secret
        run: |
          test -n "$MY_SECRET" && echo "PRESENT"
          echo "LEN=${#MY_SECRET}"
          echo "VALUE=$MY_SECRET"
