name: cond-demo
# Exercises LATCHET_LOCATION + step if/elif/else. The chain picks exactly one
# branch by location; the announce step always runs.
jobs:
  deploy:
    container: alpine:3.19
    steps:
      - name: announce
        run: echo "LOC=$LATCHET_LOCATION"
      - name: prod
        if: $LATCHET_LOCATION == server
        run: echo "BRANCH=prod"
      - name: staging
        elif: $LATCHET_LOCATION == staging
        run: echo "BRANCH=staging"
      - name: fallback
        else: true
        run: echo "BRANCH=none"
