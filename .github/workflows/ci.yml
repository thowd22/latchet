name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.2'
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        # Integration tests require a container runtime and are skipped
        # in CI; run them locally with `go test -tags integration ./...`.
        run: go test ./...
